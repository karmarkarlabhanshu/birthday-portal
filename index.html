<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Birthday Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg-cream: #FDFBF7; --dusty-rose: #D4A373; --sage-green: #A3B18A; --text-dark: #3A3A3A; --gold: #D4AF37; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; background-color: var(--bg-cream); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; background-image: radial-gradient(circle, #ffffff 10%, transparent 10.01%); background-size: 20px 20px; }
        .viewport-border { position: fixed; top: 25px; left: 25px; right: 25px; bottom: 25px; border: 2px solid var(--gold); z-index: 10; pointer-events: none; }
        .doodle { position: absolute; width: 150px; fill: var(--sage-green); opacity: 0.5; z-index: 2; }
        .top-left { top: 40px; left: 40px; }
        .bottom-right { bottom: 40px; right: 40px; transform: rotate(180deg); }
        .container { text-align: center; z-index: 5; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 10vw, 5rem); color: var(--text-dark); font-weight: 700; margin-bottom: 40px; opacity: 0; animation: slideUp 1.5s forwards; }
        h1 span { font-family: 'Dancing Script', cursive; color: var(--dusty-rose); display: block; }
        .nav-links { display: flex; gap: 40px; justify-content: center; opacity: 0; animation: fadeIn 2s 1.2s forwards; flex-wrap: wrap; }
        .nav-card { text-decoration: none; color: var(--text-dark); display: flex; flex-direction: column; align-items: center; transition: 0.4s; }
        .icon-box { width: 100px; height: 100px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); font-size: 2.5rem; animation: float 4s infinite ease-in-out; border: 1px solid #f0f0f0; }
        .nav-card:hover .icon-box { transform: scale(1.1) rotate(5deg); box-shadow: 0 15px 30px rgba(212, 163, 115, 0.3); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>
    <div class="viewport-border"></div>
    <svg class="doodle top-left" viewBox="0 0 100 100"><path d="M10,50 Q25,10 50,50 T90,50" stroke="#A3B18A" fill="transparent" stroke-width="2" /></svg>
    <div class="container">
        <h1>Happy Birthday,<br><span>Anu</span></h1>
        <nav class="nav-links">
            <a href="videos.html" class="nav-card"><div class="icon-box">🎬</div><p>The Cinema</p></a>
            <a href="scrapbook.html" class="nav-card"><div class="icon-box">📖</div><p>The Scrapbook</p></a>
            <a href="game.html" class="nav-card"><div class="icon-box">🕹️</div><p>The Arcade</p></a>
        </nav>
    </div>
    <svg class="doodle bottom-right" viewBox="0 0 100 100"><path d="M10,50 Q25,10 50,50 T90,50" stroke="#A3B18A" fill="transparent" stroke-width="2" /></svg>
</body>
</html>
