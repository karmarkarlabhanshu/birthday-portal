<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arcade | Birthday Surprises</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d55;
            --neon-gold: #d4af37;
            --bg-dark: #0f0f0f;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Retro Grid Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Bungee', cursive;
            font-size: clamp(2rem, 8vw, 4rem);
            color: var(--neon-gold);
            text-shadow: 0 0 10px var(--neon-gold);
            margin-bottom: 10px;
        }

        .arcade-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1000px;
            margin-top: 20px;
        }

        .game-card {
            background: var(--glass);
            border: 2px solid #333;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            border-color: var(--neon-gold);
            transform: translateY(-10px);
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .game-card h3 {
            font-family: 'Bungee', cursive;
            margin: 15px 0;
            color: var(--neon-gold);
        }

        .icon { font-size: 3rem; }

        /* Game Overlay */
        #game-stage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: var(--neon-pink);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Bungee', cursive;
        }

        /* Game 1 & 2 & 3 Specifics */
        .slot-machine { font-size: 3rem; margin: 20px; letter-spacing: 10px; }
        .btn-action {
            background: var(--neon-gold);
            color: black;
            border: none;
            padding: 15px 30px;
            font-family: 'Bungee', cursive;
            cursor: pointer;
            margin-top: 20px;
        }

        #word-display { font-size: 2rem; letter-spacing: 5px; margin: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>THE ARCADE</h1>
        <p>Pick a challenge to unlock a surprise!</p>
    </header>

    <div class="arcade-menu">
        <div class="game-card" onclick="startSlot()">
            <div class="icon">🎰</div>
            <h3>Date Night Slots</h3>
            <p>Let fate decide how our first date would be!</p>
        </div>

        <div class="game-card" onclick="startWord()">
            <div class="icon">🔡</div>
            <h3>The Secret Word</h3>
            <p>Guess the thing I love the most about you.</p>
        </div>

        <div class="game-card" onclick="startCompliment()">
            <div class="icon">💖</div>
            <h3>Compliment Rain</h3>
            <p>Catch as many sweet words as you can.</p>
        </div>
    </div>

    <div id="game-stage">
        <button class="close-btn" onclick="closeGame()">EXIT</button>
        <div id="game-content"></div>
    </div>

    <script>
       const stage = document.getElementById('game-stage');
        const content = document.getElementById('game-content');
        let attempts = 0; // Track tries for Game 2

        function closeGame() {
            stage.style.display = 'none';
            content.innerHTML = '';
            attempts = 0; 
        }

        // --- GAME 1: DATE NIGHT SLOTS (Keep as is) ---
        function startSlot() {
            stage.style.display = 'flex';
            content.innerHTML = `
                <h2 style="font-family:Bungee; color:var(--neon-gold)">Date Night Spinner</h2>
                <div class="slot-machine" id="slots">❓ | ❓</div>
                <button class="btn-action" onclick="spinSlots()">SPIN THE WHEEL</button>
            `;
        }

        function spinSlots() {
            const dinners = ["🍕 Pizza", "Panipuri😋", "🥟Momos", "🍔 Burgers", "🍜Chinese"];
            const movies = ["🎬 Horror", "💖 Romance", "🚀 Sci-Fi", "😂 Comedy"];
            const d = dinners[Math.floor(Math.random()*dinners.length)];
            const m = movies[Math.floor(Math.random()*movies.length)];
            document.getElementById('slots').innerText = `${d} | ${m}`;
        }

        // --- UPDATED GAME 2: THE ULTIMATE GUESSER ---
        function startWord() {
            attempts = 5;
            stage.style.display = 'flex';
            updateWordGameUI("Guess carefully... you have 5 tries.");
        }

        function updateWordGameUI(message) {
            content.innerHTML = `
                <h2 style="font-family:Bungee; color:var(--neon-gold); margin-bottom:20px;">The Heart's Riddle</h2>
                <p style="font-size: 1.2rem; margin-bottom: 10px;">Question:</p>
                <p style="font-style: italic; font-size: 1.5rem; margin-bottom: 20px;">"What do I love the most about you?"</p>
                <div id="word-display" style="color:var(--neon-pink); font-weight:bold;">Tries Left: ${attempts}</div>
                <input type="text" id="word-input" placeholder="Type here..." style="padding:12px; width:250px; text-align:center; border: 2px solid var(--neon-gold); background: #222; color: white; border-radius: 5px;">
                <br>
                <button class="btn-action" onclick="checkWord()">SUBMIT GUESS</button>
                <p id="hint-msg" style="margin-top: 15px; color: #888;">${message}</p>
            `;
        }

        function checkWord() {
            const input = document.getElementById('word-input').value.toLowerCase().trim();
            const correctAnswer = "everything";

            if (input === correctAnswer) {
                content.innerHTML = `
                    <h2 style="font-family:Bungee; color:var(--neon-gold)">BINGO! ❤️</h2>
                    <p style="font-size: 1.5rem; margin: 20px;">You got it right!</p>
                    <p style="color:var(--neon-pink); font-size: 1.2rem;">Because there isn't a single part of you that isn't perfect.</p>
                    <button class="btn-action" onclick="closeGame()">YOU WIN!</button>
                `;
            } else {
                attempts--;
                if (attempts > 0) {
                    updateWordGameUI(`Wrong! Try again. (Hint: It starts with 'E')`);
                } else {
                    content.innerHTML = `
                        <h2 style="font-family:Bungee; color:var(--neon-pink)">GAME OVER</h2>
                        <p style="margin: 20px;">Out of tries! But I'll give you a hint...</p>
                        <p>The answer starts with "E" and ends with "G".</p>
                        <button class="btn-action" onclick="startWord()">TRY AGAIN</button>
                    `;
                }
            }
        }

        // --- GAME 3: COMPLIMENT RAIN (Keep as is) ---
        function startCompliment() {
            stage.style.display = 'flex';
            content.innerHTML = `
                <h2 style="font-family:Bungee; color:var(--neon-gold)">Compliment Rain</h2>
                <div id="rain-zone" style="height:150px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:white; text-align:center; padding:20px;">
                    Click the button for a boost!
                </div>
                <button class="btn-action" onclick="rain()">SEND LOVE</button>
            `;
        }

        function rain() {
            const phrases = ["You're Beautiful ✨", "Meri Pyaari Bachhi😘", "Meri Personal devi😍", "My Darling❤️", "My Wifeyy💍", "My Whole World 🌍"];
            const p = phrases[Math.floor(Math.random()*phrases.length)];
            document.getElementById('rain-zone').innerText = p;
        }
    </script>
 </div>

        <a href="index.html" class="back-nav">← Back to Portal</a>
    </div>
</body>
</html>
