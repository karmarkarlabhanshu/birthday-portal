<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cinema | Our Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --accent-gold: #D4AF37;
            --card-bg: #1e1e1e;
            --text-gray: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Theatrical Header */
        header {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            background: linear-gradient(to bottom, #1a1a1a, var(--bg-dark));
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--accent-gold);
            letter-spacing: 3px;
            font-style: italic;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border: 1px solid #333;
            padding: 8px 20px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        /* Video Gallery Grid */
        .cinema-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            padding: 50px 8%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.4s ease;
            border: 1px solid #2a2a2a;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-gold);
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9; /* Change to 9/16 if your videos are vertical */
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* Keeps the whole video visible without cropping */
        }

        .movie-info {
            padding: 15px;
            background: #252525;
        }

        .movie-title {
            font-family: 'Playfair Display', serif;
            color: var(--accent-gold);
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .movie-filename {
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .cinema-grid { padding: 30px 5%; gap: 25px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>The Private Cinema</h1>
        <a href="index.html" class="back-link">← RETURN TO PORTAL</a>
    </header>

    <div class="cinema-grid" id="main-grid">
        </div>

    <script>
        const grid = document.getElementById('main-grid');
        
        // This loop creates all 10 video blocks automatically
        for (let i = 1; i <= 10; i++) {
          const fileName = `video${i}.mp4`;
            
            grid.innerHTML += `
                <div class="movie-card">
                    <div class="video-container">
                        <video controls preload="metadata" playsinline>
                            <source src="${fileName}" type="video/mp4">
                            Your browser does not support the video tag or the file is missing.
                        </video>
                    </div>
                    <div class="movie-info">
                        <p class="movie-title">Special Memory #${i}</p>
                        <p class="movie-filename">Looking for: ${fileName}</p>
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
