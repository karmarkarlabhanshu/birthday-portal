<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scrapbook | Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@1,700&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fdfaf0;
            --tape: rgba(212, 163, 115, 0.3);
            --text: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #dcdcdc; /* Desk surface */
            background-image: url("https://www.transparenttextures.com/patterns/pinstriped-suit.png");
            font-family: 'Montserrat', sans-serif;
            padding: 50px 20px;
            color: var(--text);
        }

        .scrapbook-page {
            max-width: 1100px;
            margin: 0 auto;
            background-color: var(--paper);
            background-image: url("https://www.transparenttextures.com/patterns/lined-paper-2.png");
            padding: 60px 40px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2);
            position: relative;
            border-left: 20px solid #e0d9c5; /* Binder effect */
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 10vw, 4.5rem);
            color: #8b5e3c;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            letter-spacing: 2px;
            font-size: 0.9rem;
            color: #999;
        }

        /* The Grid for 8 Panels */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 50px;
            justify-items: center;
        }

        /* Polaroid Panel Styling */
        .polaroid {
            background: white;
            padding: 15px 15px 45px 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
            transition: 0.4s ease;
            width: 100%;
            max-width: 280px;
        }

        .polaroid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .caption {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            text-align: center;
            margin-top: 15px;
            color: #555;
        }

        /* Washi Tape Decoration */
        .polaroid::before {
            content: "";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 30px;
            background: var(--tape);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.02);
            z-index: 5;
        }

        /* Rotation for that "Handmade" feel */
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:nth-child(odd) { transform: rotate(-3deg); }
        .polaroid:nth-child(3n) { transform: rotate(1.5deg); }

        .polaroid:hover {
            transform: rotate(0deg) scale(1.05);
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .back-nav {
            display: block;
            text-align: center;
            margin-top: 80px;
            text-decoration: none;
            color: #8b5e3c;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .scrapbook-page { padding: 40px 15px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="scrapbook-page">
        <header>
            <p class="subtitle">A COLLECTION OF US</p>
            <h1>The Scrapbook</h1>
        </header>

        <div class="grid" id="photo-grid">
            </div>

        <a href="index.html" class="back-nav">← RETURN TO PORTAL</a>
    </div>

    <script>
        const photoGrid = document.getElementById('photo-grid');
        
        // Array of captions for your 8 panels
        const captions = [
            "The very beginning ✨",
        "The shift to instagram",
        "we started to chat all night",
        "Became Bestfriends",
        "We sat together on the school bench",
        "We became lovers",
        "Our first kiss in the school",
        "our first hugs and cuddles at my home."
        ];

        // This loop creates all 8 photo slots automatically
        for (let i = 1; i <= 8; i++) {
            photoGrid.innerHTML += `
                <div class="polaroid">
                    <img src="images/photo${i}.jpeg" alt="Memory ${i}">
                    <p class="caption">${captions[i-1]}</p>
                </div>
            `;
        }
    </script>

</body>
</html>
